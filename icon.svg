<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d9ab0"/>
      <stop offset="100%" stop-color="#0d3e4a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Phone body -->
  <rect x="148" y="80" width="216" height="352" rx="36" fill="white"/>

  <!-- Screen -->
  <rect x="166" y="116" width="180" height="270" rx="10" fill="#1e7a8c" opacity="0.10"/>

  <!-- Camera notch -->
  <rect x="222" y="96" width="68" height="10" rx="5" fill="#1e7a8c" opacity="0.18"/>

  <!-- Feed lines — simulate a social media scroll -->
  <!-- Avatar + line row 1 -->
  <circle cx="196" cy="172" r="14" fill="#1e7a8c" opacity="0.22"/>
  <rect x="218" y="165" width="100" height="9" rx="4.5" fill="#0d3e4a" opacity="0.18"/>
  <rect x="218" y="179" width="72" height="7" rx="3.5" fill="#0d3e4a" opacity="0.10"/>

  <!-- Image placeholder row 1 -->
  <rect x="182" y="200" width="148" height="52" rx="8" fill="#1e7a8c" opacity="0.14"/>

  <!-- Avatar + line row 2 -->
  <circle cx="196" cy="276" r="14" fill="#1e7a8c" opacity="0.22"/>
  <rect x="218" y="269" width="88" height="9" rx="4.5" fill="#0d3e4a" opacity="0.18"/>
  <rect x="218" y="283" width="60" height="7" rx="3.5" fill="#0d3e4a" opacity="0.10"/>

  <!-- Image placeholder row 2 -->
  <rect x="182" y="304" width="148" height="52" rx="8" fill="#1e7a8c" opacity="0.14"/>

  <!-- Home bar -->
  <rect x="216" y="400" width="80" height="10" rx="5" fill="#1e7a8c" opacity="0.22"/>

  <!-- "Off" badge — coral circle top-right -->
  <circle cx="352" cy="96" r="44" fill="#0d3e4a"/>
  <circle cx="352" cy="96" r="38" fill="#f4845f"/>
  <!-- Power icon inside badge -->
  <path d="M352 72 L352 90" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <path d="M336 80 A24 24 0 1 0 368 80" stroke="white" stroke-width="7" stroke-linecap="round" fill="none"/>
</svg>
